services:
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: llm-gateway
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      REQUEST_TIMEOUT: "30s"
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
    extra_hosts:
      - "host.docker.internal:host-gateway"