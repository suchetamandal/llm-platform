services:
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: llm-gateway
    ports:
      - "8080:8080"
    environment:
      JWT_SECRET: "dev-secret"
      PORT: "8080"
      REQUEST_TIMEOUT: "30s"
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
      REDIS_ADDR: "redis:6379"
      RAG_SERVICE_URL: http://rag-service:8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
      - rag-service

  postgres:
    image: pgvector/pgvector:pg16
    container_name: llm-platform-postgres
    environment:
      POSTGRES_USER: llm
      POSTGRES_PASSWORD: llm
      POSTGRES_DB: rag
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: llm-redis

  rag-service:
    build:
      context: ./rag-service
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://llm:llm@postgres:5432/rag
      EMBEDDING_PROVIDER: ollama
      CHAT_PROVIDER: ollama
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    depends_on:
      - postgres   

volumes:
  postgres_data: